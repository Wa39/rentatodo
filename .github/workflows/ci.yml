name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
      - release/*
      - hotfix/*

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rentatodo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - run: pip install -r requirements.txt

      - run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/rentatodo_test
          JWT_SECRET: ci-not-a-secret

      - run: pytest
        env:
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/rentatodo_test
          JWT_SECRET: ci-not-a-secret

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npx expo lint

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'
          run_install: false

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - run: pnpm tsc -b --noEmit

      - run: pnpm test

  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'
          run_install: false

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - run: pnpm exec playwright install chromium --with-deps

      - run: pnpm test
        env:
          CI: true

  # ci-gate is the required check registered in the branch ruleset.
  # It passes only when all app jobs above pass.
  ci-gate:
    needs: [api, mobile, web, playwright]
    runs-on: ubuntu-latest
    steps:
      - run: echo "ci-gate passed"
