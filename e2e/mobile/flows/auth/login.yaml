# Happy-path login with seeded renter account.
# Seed credentials: renter@rentatodo.dev / Rentatodo2026!
# Run: maestro test e2e/mobile/flows/auth/login.yaml

appId: host.exp.Exponent  # Expo Go; replace with bundle ID for standalone builds
---
- launchApp
- assertVisible: "RentaTodo"
- tapOn:
    text: "Iniciar sesión"
- clearText:
    placeholder: "correo@ejemplo.com"
- inputText:
    text: "renter@rentatodo.dev"
- tapOn:
    placeholder: "••••••••"
- inputText:
    text: "Rentatodo2026!"
- tapOn:
    text: "Iniciar sesión"
- assertVisible: "Inicio"
- assertVisible: "Mis rentas"
- assertVisible: "Perfil"
