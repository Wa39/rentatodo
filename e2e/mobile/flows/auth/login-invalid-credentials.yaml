# Login with wrong password — expects inline error message.
# Run: maestro test e2e/mobile/flows/auth/login-invalid-credentials.yaml

appId: host.exp.Exponent
---
- launchApp
- assertVisible: "RentaTodo"
- tapOn:
    text: "Iniciar sesión"
- tapOn:
    placeholder: "correo@ejemplo.com"
- inputText:
    text: "owner@rentatodo.dev"
- tapOn:
    placeholder: "••••••••"
- inputText:
    text: "wrong-password"
- tapOn:
    text: "Iniciar sesión"
- assertVisible: "Correo o contraseña incorrectos."
- assertNotVisible: "Inicio"
