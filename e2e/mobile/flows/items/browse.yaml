# Browse items on home screen — search + filter segments.
# Requires 7 seeded items (infra/seed.py).
# Run: maestro test e2e/mobile/flows/items/browse.yaml

appId: host.exp.Exponent
---
- launchApp
- tapOn:
    placeholder: "correo@ejemplo.com"
- inputText:
    text: "renter@rentatodo.dev"
- tapOn:
    placeholder: "••••••••"
- inputText:
    text: "Rentatodo2026!"
- tapOn:
    text: "Iniciar sesión"
- assertVisible: "RentaTodo"
- tapOn:
    placeholder: "Buscar artículos…"
- inputText:
    text: "bicicleta"
- assertVisible: "Bicicleta de montaña Trek"
