openapi: 3.0.3
info:
  title: RentaTodo API
  description: |
    Peer-to-peer item rental marketplace API.
    All monetary values are in USD centavos (integer). 5000 = $50.00. Never use decimals.
    All dates use ISO 8601 format (YYYY-MM-DD).
    All timestamps use ISO 8601 with timezone (YYYY-MM-DDTHH:MM:SSZ).
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Local development

# ──────────────────────────────────────────────
# SECURITY
# ──────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /auth/login. Expires in 24h.

  # ──────────────────────────────────────────
  # SCHEMAS
  # ──────────────────────────────────────────
  schemas:

    # ── ERROR ──
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "The dates July 18-20 are already reserved for this item"

    # ── AUTH ──
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
          example: "María Vargas"
        email:
          type: string
          format: email
          example: "maria@example.com"
        password:
          type: string
          minLength: 8
          example: "securepass123"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
        token_type:
          type: string
          example: "bearer"

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    # ── ITEMS ──
    CategoryEnum:
      type: string
      enum:
        - tools
        - photography
        - camping
        - sports
        - electronics
        - home

    CreateItemRequest:
      type: object
      required: [name, description, category, price_per_day, photo_url]
      properties:
        name:
          type: string
          minLength: 1
          example: "Taladro Bosch Professional"
        description:
          type: string
          minLength: 1
          example: "Taladro inalámbrico 18V con maletín y 3 brocas"
        category:
          $ref: "#/components/schemas/CategoryEnum"
        price_per_day:
          type: integer
          minimum: 1
          description: "Price in USD centavos. 5000 = $50.00"
          example: 5000
        photo_url:
          type: string
          format: uri
          example: "https://storage.example.com/photos/taladro.jpg"

    UpdateItemRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        category:
          $ref: "#/components/schemas/CategoryEnum"
        price_per_day:
          type: integer
          minimum: 1
        photo_url:
          type: string
          format: uri

    ItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/CategoryEnum"
        price_per_day:
          type: integer
          description: "In centavos"
        photo_url:
          type: string
          format: uri
        is_active:
          type: boolean
        owner_id:
          type: string
          format: uuid
        owner_name:
          type: string
        created_at:
          type: string
          format: date-time

    ItemDetailResponse:
      allOf:
        - $ref: "#/components/schemas/ItemResponse"
        - type: object
          properties:
            unavailable_dates:
              type: array
              description: "Ranges of dates already reserved (status in solicitada, aprobada, entregada, devuelta)"
              items:
                type: object
                properties:
                  start_date:
                    type: string
                    format: date
                  end_date:
                    type: string
                    format: date

    ItemListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItemResponse"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    # ── RESERVATIONS ──
    ReservationStatusEnum:
      type: string
      enum:
        - requested
        - approved
        - delivered
        - returned
        - closed
        - rejected
        - cancelled

    CreateReservationRequest:
      type: object
      required: [start_date, end_date]
      properties:
        start_date:
          type: string
          format: date
          description: "First day of rental. Must be today or future."
          example: "2026-07-18"
        end_date:
          type: string
          format: date
          description: "Last day of rental. Must be >= start_date."
          example: "2026-07-20"

    ReservationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        item_id:
          type: string
          format: uuid
        item_name:
          type: string
        item_photo_url:
          type: string
          format: uri
        renter_id:
          type: string
          format: uuid
        renter_name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/ReservationStatusEnum"
        deposit_amount:
          type: integer
          description: "In centavos. Calculated: price_per_day × number of days"
        deposit_status:
          type: string
          enum: [none, held, released, frozen]
          description: "Derived from the latest transaction record"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReservationListResponse:
      type: object
      properties:
        reservations:
          type: array
          items:
            $ref: "#/components/schemas/ReservationResponse"
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    # ── CHECK EVIDENCE ──
    CheckInOutRequest:
      type: object
      required: [photo_url]
      properties:
        photo_url:
          type: string
          format: uri
          description: "Photo evidence of item condition"
        notes:
          type: string
          description: "Optional notes about the item condition"
          example: "Received with case and 3 drill bits"

    # ── REPORTS ──
    CreateReportRequest:
      type: object
      required: [reason, photo_url]
      properties:
        reason:
          type: string
          minLength: 1
          description: "Free text description of the problem"
          example: "The drill bit was broken when I received it"
        photo_url:
          type: string
          format: uri
          description: "Required photo evidence of the problem"

    ReportResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reservation_id:
          type: string
          format: uuid
        reported_by:
          type: string
          format: uuid
        reason:
          type: string
        photo_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    # ── TRANSACTIONS ──
    TransactionTypeEnum:
      type: string
      enum:
        - hold
        - release
        - freeze

    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reservation_id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/TransactionTypeEnum"
        amount:
          type: integer
          description: "In centavos"
        created_at:
          type: string
          format: date-time

    # ── EARNINGS ──
    EarningsResponse:
      type: object
      properties:
        total_earnings:
          type: integer
          description: "Total earnings in centavos"
        by_item:
          type: array
          items:
            type: object
            properties:
              item_id:
                type: string
                format: uuid
              item_name:
                type: string
              total:
                type: integer
                description: "In centavos"
              rentals:
                type: array
                items:
                  type: object
                  properties:
                    start_date:
                      type: string
                      format: date
                    end_date:
                      type: string
                      format: date
                    amount:
                      type: integer

# ──────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════
  # AUTH — Week 1 (Days 1-3)
  # ══════════════════════════════════════════

  /auth/register:
    post:
      tags: [Auth]
      summary: Create a new account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          description: Invalid data or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ══════════════════════════════════════════
  # ITEMS — Week 1 (Days 4-5)
  # ══════════════════════════════════════════

  /items:
    post:
      tags: [Items]
      summary: Publish a new item
      description: |
        Owner ID is extracted from the JWT token, never from the request body.
        Price must be in centavos (integer).
      operationId: createItem
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid data (bad category, price <= 0, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      tags: [Items]
      summary: List active items with filters
      description: |
        Returns all active items. No authentication required.
        Search is case-insensitive, accent-insensitive, and supports partial matches.
        Search looks in both name and description fields.
        All filters are optional and combinable.
      operationId: listItems
      parameters:
        - name: q
          in: query
          description: "Text search in name and description (case-insensitive, accent-insensitive, partial match)"
          schema:
            type: string
        - name: category
          in: query
          description: "Filter by exact category"
          schema:
            $ref: "#/components/schemas/CategoryEnum"
        - name: min_price
          in: query
          description: "Minimum price per day in USD centavos (inclusive)"
          schema:
            type: integer
            minimum: 0
        - name: max_price
          in: query
          description: "Maximum price per day in USD centavos (inclusive)"
          schema:
            type: integer
            minimum: 0
        - name: available_from
          in: query
          description: "Filter items available starting from this date"
          schema:
            type: string
            format: date
        - name: available_to
          in: query
          description: "Filter items available until this date"
          schema:
            type: string
            format: date
        - name: sort
          in: query
          description: "Sort order"
          schema:
            type: string
            enum: [popular, recent]
            default: recent
        - name: page
          in: query
          description: "Page number (1-indexed)"
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: "Items per page"
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Paginated list of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"

  /items/{item_id}:
    get:
      tags: [Items]
      summary: Get item detail with unavailable dates
      description: |
        Returns item detail including owner info and unavailable date ranges.
        Public endpoint — response is identical with or without token.
        The client compares owner_id with the logged-in user to detect own items.
      operationId: getItem
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDetailResponse"
        "404":
          description: Item not found or inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      tags: [Items]
      summary: Edit own item
      description: "Only the owner can edit. Returns 403 if token user is not the owner."
      operationId: updateItem
      security:
        - BearerAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Items]
      summary: Soft delete item (set is_active = false)
      description: "Only the owner can delete. Never removes the record from the database."
      operationId: deleteItem
      security:
        - BearerAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Item deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/items:
    get:
      tags: [Items]
      summary: List my published items (including inactive)
      operationId: listMyItems
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of own items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ══════════════════════════════════════════
  # RESERVATIONS — Week 2 (Vertical Slice)
  # ══════════════════════════════════════════

  /items/{item_id}/reservations:
    post:
      tags: [Reservations]
      summary: Request a reservation
      description: |
        Creates a reservation in "requested" status.
        Validates:
        - Dates are valid (end_date >= start_date, start_date >= today)
        - User is not the item owner (cannot rent own item)
        - No overlapping active reservations (double booking prevention)
        - Item is active
        Deposit is calculated as price_per_day × number of days.
        Uses database transaction with lock to prevent race conditions.
      operationId: createReservation
      security:
        - BearerAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "201":
          description: Reservation created with status "requested"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Item not found or inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Dates overlap with existing reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid dates or trying to rent own item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/reservations:
    get:
      tags: [Reservations]
      summary: My reservations as renter
      description: "List of reservations where the authenticated user is the renter. Used by the mobile app for polling."
      operationId: listMyReservations
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: "Filter by status"
          schema:
            $ref: "#/components/schemas/ReservationStatusEnum"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Paginated list of my reservations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/requests:
    get:
      tags: [Reservations]
      summary: Reservation requests received as item owner
      description: |
        List of reservations on items owned by the authenticated user.
        Includes renter name and dates directly in the response.
        Used by the dashboard for managing incoming requests.
      operationId: listMyRequests
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: "Filter by status"
          schema:
            $ref: "#/components/schemas/ReservationStatusEnum"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Paginated list of requests on my items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reservations/{reservation_id}/approve:
    patch:
      tags: [Reservations]
      summary: Approve a reservation request
      description: |
        Only the item owner can approve.
        Transitions: requested → approved.
        Creates a HOLD transaction (deposit retained).
      operationId: approveReservation
      security:
        - BearerAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reservation approved, deposit held
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the item owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid transition (not in "requested" status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reservations/{reservation_id}/reject:
    patch:
      tags: [Reservations]
      summary: Reject a reservation request
      description: |
        Only the item owner can reject.
        Transitions: requested → rejected.
        Dates become available for others.
      operationId: rejectReservation
      security:
        - BearerAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reservation rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the item owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reservations/{reservation_id}/cancel:
    patch:
      tags: [Reservations]
      summary: Cancel a reservation
      description: |
        Only the renter can cancel.
        Transitions: requested → cancelled OR approved → cancelled.
        If there was a HOLD, creates a RELEASE transaction (deposit returned).
      operationId: cancelReservation
      security:
        - BearerAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reservation cancelled. RELEASE created if there was a HOLD.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the renter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid transition (not in "requested" or "approved")
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ══════════════════════════════════════════
  # CHECK-IN/OUT & CLOSE — Week 3
  # ══════════════════════════════════════════

  /reservations/{reservation_id}/checkin:
    post:
      tags: [Delivery]
      summary: Register item pickup with photo evidence
      description: |
        Only the renter can check in.
        Transitions: approved → delivered.
        Photo is required as evidence of item condition at pickup.
      operationId: checkIn
      security:
        - BearerAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInOutRequest"
      responses:
        "201":
          description: Check-in recorded, status changed to "delivered"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the renter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid transition (not in "approved")
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reservations/{reservation_id}/checkout:
    post:
      tags: [Delivery]
      summary: Register item return with photo evidence
      description: |
        Only the renter can check out.
        Transitions: delivered → returned.
        Photo is required as evidence of item condition at return.
      operationId: checkOut
      security:
        - BearerAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInOutRequest"
      responses:
        "201":
          description: Check-out recorded, status changed to "returned"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the renter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invalid transition (not in "delivered")
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reservations/{reservation_id}/close:
    patch:
      tags: [Delivery]
      summary: Close reservation and release deposit
      description: |
        Only the item owner can close.
        Transitions: returned → closed.
        Creates a RELEASE transaction (deposit returned to renter).
        REJECTS the action if there is an active FREEZE (open problem report).
      operationId: closeReservation
      security:
        - BearerAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reservation closed, deposit released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the item owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: "Invalid transition or active FREEZE exists (open problem report)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ══════════════════════════════════════════
  # REPORTS & TRANSACTIONS — Weeks 3-4
  # ══════════════════════════════════════════

  /reservations/{reservation_id}/report:
    post:
      tags: [Reports]
      summary: Report a problem (freezes deposit)
      description: |
        Both owner and renter can report.
        Only from "delivered" or "returned" status.
        Creates REPORT + FREEZE in a single database transaction.
        The reservation status does NOT change.
        Only one report per reservation allowed.
        Photo is required.
      operationId: reportProblem
      security:
        - BearerAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "201":
          description: Report created, deposit frozen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the owner or renter of this reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: "Invalid status for reporting OR report already exists for this reservation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reservations/{reservation_id}/transactions:
    get:
      tags: [Transactions]
      summary: Get deposit history for a reservation
      description: |
        Both owner and renter can view.
        Returns the immutable audit trail: HOLD, RELEASE, FREEZE records.
      operationId: getTransactions
      security:
        - BearerAuth: []
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not the owner or renter of this reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ══════════════════════════════════════════
  # EARNINGS — Week 3
  # ══════════════════════════════════════════

  /users/me/earnings:
    get:
      tags: [Earnings]
      summary: Get owner earnings summary
      description: |
        Returns total earnings and breakdown by item.
        Each item shows its rentals with date ranges and amounts.
        Does not include renter names (privacy by design).
        Only counts closed reservations with released deposits.
      operationId: getEarnings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
